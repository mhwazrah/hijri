server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Service worker must always revalidate so updates reach clients immediately
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # App shell: revalidate every load (the service worker handles offline)
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Versioned assets (?v=) and icons can be cached normally by the browser/SW
    location / {
        try_files $uri $uri/ /index.html;
    }
}
