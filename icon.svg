<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Hijri Calendar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e1835"/>
      <stop offset="1" stop-color="#030712"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <mask id="crescent">
      <rect width="512" height="512" fill="black"/>
      <circle cx="256" cy="256" r="184" fill="white"/>
      <circle cx="322" cy="231" r="161" fill="black"/>
    </mask>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>

  <!-- Decorative stars -->
  <circle cx="82" cy="102" r="4" fill="#fff" opacity="0.8"/>
  <circle cx="123" cy="400" r="3" fill="#fff" opacity="0.7"/>
  <circle cx="62" cy="282" r="2.5" fill="#fff" opacity="0.6"/>
  <circle cx="420" cy="410" r="3.5" fill="#fff" opacity="0.7"/>
  <circle cx="154" cy="174" r="2.5" fill="#fff" opacity="0.6"/>

  <!-- Crescent (outer disc minus offset disc) -->
  <rect width="512" height="512" fill="url(#gold)" mask="url(#crescent)"/>

  <!-- Five-pointed star -->
  <path fill="url(#gold)" d="M368.6 148.5 L382.5 185.7 L422.2 187.4 L391.1 212.1 L401.7 250.4 L368.6 228.4 L335.5 250.4 L346.2 212.1 L315.1 187.4 L354.7 185.7 Z"/>
</svg>
